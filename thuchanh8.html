<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
      display: grid;
      grid-template-rows: repeat(12, 1fr);
      gap: 10px;
      background-color: white;
      padding: 10px;
    }

    .item-1:nth-child() {
      grid-row: 1 / 13;
    }

    .item-2 {
      grid-row: 1 / 7;
    }

    .item-3 {
      grid-row: 7 / 13;
    }


    .item-4 {
      grid-row: 1 / 5;
    }

    .item-5 {
      grid-row: 5 / 9;
    }

    .item-6 {
      grid-row: 9 / 13;
    }

    .item-7 {
      grid-row: 1 / 4;
    }

    .item-8 {
      grid-row: 4 / 7;
    }

    .item-9 {
      grid-row: 7 / 10;
    }

    .item-10 {
      grid-row: 10 / 13;
    }


    .item-11 {
      grid-row: 1 / 3;
    }

    .item-12 {
      grid-row: 3 / 5;
    }

    .item-13 {
      grid-row: 5 / 7;
    }

    .item-14 {
      grid-row: 7 / 9;
    }

    .item-15 {
      grid-row: 9 / 11;
    }

    .item-16 {
      grid-row: 11 / 13;
    }

    .item-17 {
      grid-row: 1 / 2;
    }

    .item-18 {
      grid-row: 2 / 3;
    }



    .container div {
      background-color: #9ACD32;
      color: white;
      text-align: center;
      padding: 15px 0;
      font-family: Arial, sans-serif;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="item item-1">1</div>

    <div class="item item-2">2</div>
    <div class="item item-3">3</div>

    <div class="item item-4">4</div>
    <div class="item item-5">5</div>
    <div class="item item-6">6</div>

    <div class="item item-7">7</div>
    <div class="item item-8">8</div>
    <div class="item item-9">9</div>
    <div class="item item-10">10</div>

    <div class="item item-11">11</div>
    <div class="item item-12">12</div>
    <div class="item item-13">13</div>
    <div class="item item-14">14</div>
    <div class="item item-15">15</div>
    <div class="item item-16">16</div>

    <div class="item item-17">17</div>
    <div class="item item-18">18</div>
    <div class="item item-19">19</div>
    <div class="item item-20">20</div>
    <div class="item item-21">21</div>
    <div class="item item-22">22</div>
    <div class="item item-23">23</div>
    <div class="item item-24">24</div>
    <div class="item item-25">25</div>
    <div class="item item-26">26</div>
    <div class="item item-27">27</div>
    <div class="item item-28">28</div>
  </div>
</body>

</html>
