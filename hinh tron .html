<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .triangle {
      display: flex;
    }

    .triangle-l {
      width: 0;
      height: 0;
      border-left: 50px solid transparent;
      border-bottom: 80px solid red;
    }

    .triangle-r {
      width: 0;
      height: 0;
      border-right: 50px solid transparent;
      border-bottom: 80px solid red;
    }

    .triangle-lb {
      width: 0;
      height: 0;
      border-left: 50px solid transparent;
      border-top: 80px solid red;
    }

    .triangle-rb {
      width: 0;
      height: 0;
      border-right: 50px solid transparent;
      border-top: 80px solid red;
    }

    .triangle-top {
      width: 0;
      height: 0;
      border-left: 50px solid transparent;
      border-right: 50px solid transparent;
      border-bottom: 80px solid red;
    }

    .triangle-bottom {
      width: 0;
      height: 0;
      border-left: 50px solid transparent;
      border-right: 50px solid transparent;
      border-top: 80px solid red;
    }

    .hinh3 {
      display: flex;
    }

    .box {
      width: 100px;
      height: 100px;
      background-color: red;
    }

    .triangle-3 {
      width: 0;
      height: 0;
      border-top: 50px solid transparent;
      border-left: 80px solid red;
      border-bottom: 50px solid transparent;
    }

    .box1 {
      width: 100px;
      height: 100px;
      border-radius: 0 50px 50px 0;
      background: red;
    }

    .box2 {
      width: 100px;
      height: 100px;
      border-radius: 50px 0 0 50px;
      background: red;
    }
  </style>
</head>

<body>
  <span>hinh 1</span>
  <div class="triangle">
    <div class="triangle-l"></div>
    <div class="triangle-r"></div>
  </div>
  <div class="triangle">
    <div class="triangle-lb"></div>
    <div class="triangle-rb"></div>
  </div>

  <span>hinh 2</span>
  <div class="triangle-2">

    <div class="triangle-bottom"></div>
    <div class="triangle-top"></div>
  </div>

  <span>hinh 3</span>
  <div class="hinh3">
    <div class="box"></div>
    <div class="triangle-3"></div>
  </div>
  <span>hinh 4</span>
  <div class="hinh3">
    <div class="box1"></div>
    <div class="box2"></div>
  </div>




</body>

</html>
