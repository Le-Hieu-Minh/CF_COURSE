<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container {
      position: relative;
      width: 200px;
      height: 200px;
    }

    .square {
      width: 100px;
      height: 100px;
      background: blue;
      position: absolute;
      top: 50px;
      left: 50px;
    }

    .arrow {
      width: 20px;
      height: 20px;
      background: red;
      color: yellow;

      position: absolute;
      transform: translate(0, -50%);
      animation: moveAround 3s linear infinite;
    }


    @keyframes moveAround {
      0% {
        top: 0;
        left: 0;
        transform: translate(0, -50%) rotate(0deg);

      }

      25% {
        top: 0;
        left: 80px;
        transform: translate(0, -50%) rotate(0deg);
      }


      26% {
        transform: translate(50%, 0) rotate(90deg);
      }

      50% {
        top: 80px;
        left: 80px;
        transform: translate(100%, -50%) rotate(90deg);
      }


      51% {
        transform: translate(0, -50%) rotate(180deg);
      }

      75% {
        top: 80px;
        left: 0;
        transform: translate(0, -50%) rotate(180deg);
      }


      76% {
        transform: translate(0, -50%) rotate(270deg);
      }

      100% {
        top: 0;
        left: 0;
        transform: translate(0, -50%) rotate(270deg);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="square">
      <div class="arrow">=></div>
    </div>

  </div>
</body>

</html>
