  <Script>
    function tryangle(n) {
      for (let i = 1; i <= n; i++) {
        let row = "";

        for (let k = 1; k <= i; k++) {
          row += "*";
        }


        console.log(row);

      }
    }


    tryangle(5);

    function tren(n) {
      for (let i = 1; i <= n; i++) {
        let row = "";

        //khoang trang
        for (let j = 1; j <= n - i; j++) {
          row += " ";
        }

        //nua tren
        for (let k = 1; k <= i; k++) {
          row += "*";
        }

        for (let l = 1; l <= i - 1; l++) {
          row += "*";
        }

        console.log(row);


      }
      let cot = "";
      for (let l = 1; l <= n - 1; l++) {
        cot += " ";
      }
      cot += "*";
      console.log(cot);
    }




    function cot(n) {
      for (let i = 1; i <= n; i++) {
        let row = "";
        for (let j = 1; j <= n; j++) {
          if (i === 1 || i === n || j === 1 || j === n || j === 4) {
            row += "*";
          }
          row += "";
        }





        console.log(row);
      }
    }

    function duoi(n) {
      for (let i = n - 1; i >= 1; i--) {
        let row = "";

        //khoang trang
        for (let j = 1; j <= n - i; j++) {
          row += " ";
        }

        //nua duoi
        for (let k = 1; k <= i; k++) {
          row += "*";
        }

        for (let l = 1; l <= i - 1; l++) {
          row += "*";
        }
        console.log(row);
      }
    }


    console.log("------------");

    tren(5);
    console.log("------------");

    cot(6)
    console.log("-----------");

    duoi(5)
    function vuongrong(n) {
      let s = "";
      for (let i = 1; i <= n; i++) {
        for (let j = 1; j <= n; j++) {
          if (i === 1 || i === n || j === 1 || j === n) {
            s += " *";
          }
          s += "";
        }
        s += "\n";
      }
      console.log(s);
    }
    vuongrong(5);

  </Script>
