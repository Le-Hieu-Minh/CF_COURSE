<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./public/css/bai3.css">
  <title>Bài 3</title>
</head>

<body>
  <div class="collections-section">

    <div>
      <h1 class="section-title">Popular Collections</h1>
      <nav class="filter-nav">
        <button class="filter-btn">Profile</button>
        <button class="filter-btn">New York</button>
        <button class="filter-btn">Relaxing</button>
        <button class="filter-btn">Person</button>
        <button class="filter-btn">Fashion</button>
      </nav>
    </div>

    <div class="collections-grid">

      <div class="collection-card">

        <div class="main-image">
          <img src="./public/image/people1.png" alt="People collection">
        </div>

        <div class="thumbnails-row">
          <div class="thumb"><img src="./public/image/people2.png" alt="thumb">
          </div>
          <div class="thumb"><img src="./public/image/people4.png" alt="thumb">
          </div>
          <div class="thumb"><img src="./public/image/people3.png" alt="thumb">
          </div>
        </div>

        <div class="card-info">
          <h2 class="card-title">People</h2>
          <span class="count-badge"><i class="fa-regular fa-image"></i>144k</span>
        </div>

      </div>

      <div class="collection-card">

        <div class="main-image">
          <img src="./public/image/nature4.png" alt="People collection">
        </div>

        <div class="thumbnails-row">
          <div class="thumb"><img src="./public/image/nature3.png" alt="thumb">
          </div>
          <div class="thumb"><img src="./public/image/nature2.png" alt="thumb">
          </div>
          <div class="thumb"><img src="./public/image/nature1.png" alt="thumb">
          </div>
        </div>

        <div class="card-info">
          <h2 class="card-title">Nature</h2>
          <span class="count-badge"><i class="fa-regular fa-image"></i>7k</span>
        </div>

      </div>

      <div class="collection-card">

        <div class="main-image">
          <img src="./public/image/history4.png" alt="People collection">
        </div>

        <div class="thumbnails-row">
          <div class="thumb"><img src="./public/image/history3.png" alt="thumb">
          </div>
          <div class="thumb"><img src="./public/image/history2.png" alt="thumb">
          </div>
          <div class="thumb"><img src="./public/image/history1.png" alt="thumb">
          </div>
        </div>

        <div class="card-info">
          <h2 class="card-title">History</h2>
          <span class="count-badge"><i class="fa-regular fa-image"></i>463</span>
        </div>

      </div>

    </div>
  </div>



</body>

</html>
