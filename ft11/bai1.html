<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./public/css/bai1.css">
  <title>Bài 1</title>

</head>

<body>
  <main>
    <div class="product-card">

      <div class="product-image">
        <img src="./public/image/image.png" alt="Razer Kraken Kitty Quartz">
      </div>

      <div class="product-info">
        <div>
          <p class="badge">Free shipping</p>
          <h1 class="product-title">Razer Kraken Kitty Edt Gaming Headset Quartz</h1>
        </div>

        <div class="price-container">
          <p class="old-price">1.599.000</p>
          <p class="current-price">799.000</p>
          <p class="offer-expiry">The offer is valid until April 3 or as long as stock lasts!</p>
        </div>

        <button class="btn-primary">Add to cart</button>

        <div class="stock-status">
          <span class="stock-dot"></span>
          50+ pcs. in stock.
        </div>

        <div class="product-actions">
          <button class="btn-secondary">
            <i class="fa-solid fa-scale-balanced"></i> Add to cart
          </button>
          <button class="btn-secondary">
            <i class="fa-regular fa-heart"></i> Add to wishlist
          </button>
        </div>
      </div>

    </div>
  </main>
</body>

</html>
