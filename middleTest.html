<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #F7F4FF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .search-card {
      width: 640px;
      height: 464px;
      border-radius: 24px;
      background: #FFF;
      box-shadow: 0 14px 52px -20px #8675B4;
      padding: 72px;
      position: relative;

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 32px;
        cursor: pointer;

        .search-wrapper {
          display: flex;
          width: 348px;
          padding: 16px;
          align-items: center;
          gap: 10px;
          border-radius: 4px;
          border: 1px solid var(--Style, #DBD5EC);
        }

        .search-wrapper img {
          width: 22px;
          height: 22px;
          flex-shrink: 0;
          opacity: 0.54;
        }

        .search-wrapper input,
        .search-wrapper input::placeholder {
          color: rgba(40, 26, 81, 0.54);
          font-size: 16px;
          font-style: normal;
          font-weight: 400;
          line-height: normal;
          border: none;
          outline: none;
        }

        .map {
          display: inline-flex;
          padding: 16px;
          align-items: center;
          gap: 10px;
          border-radius: 4px;
          background: #281A51;
        }

        .map:hover {
          background: #CA1628;
        }

        .map img {
          width: 22px;
          height: 22px;
        }

        .map span {
          color: #FFF;
          font-size: 16px;
          font-style: normal;
          font-weight: 400;
          line-height: normal;
        }
      }

      .category-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;

        .cat-card {
          display: flex;
          width: 112px;
          padding: 24px;
          flex-direction: column;
          align-items: center;
          gap: 4px;
          border-radius: 8px;

          cursor: pointer;
        }

        .cat-card:nth-child(1) {
          margin-bottom: 16px;
        }

        .cat-card:nth-child(2) {
          margin-bottom: 16px;
        }

        .cat-card:nth-child(3) {
          margin-bottom: 16px;
        }

        .cat-card:nth-child(4) {
          margin-bottom: 16px;
        }

        .cat-card:hover {
          background: #CA1628;
        }


        .cat-card img {
          width: 32px;
          height: 32px;
          margin-bottom: 4px;
        }

        .cat-card .label {
          color: #281A51;
          font-size: 16px;
          font-style: normal;
          font-weight: 400;
          line-height: normal;
        }

        .bg-pink {
          background: #FFECEC;
        }

        .bg-purple {
          background: #F7ECFF;
        }

        .bg-blue {
          background: #ECF0FF;
        }

        .bg-teal {
          background: #D7F9F3;
        }

        .bg-green {
          background: #E2FFD4;
        }

        .bg-white {
          background: #FFFFFF;
        }

        .bg-yellow {
          background: #FFF3C9;
        }

        .bg-orange {
          background: #FFD9C9;
        }
      }

    }

    .search-card::after {
      content: "";
      position: absolute;
      width: 421px;
      height: 613px;
      border-radius: 31px;
      background: #EFEBFD;
      top: -75px;
      left: 110px;
      z-index: -1;
    }
  </style>
  <title>Document</title>
</head>

<body>
  <main class="search-card">
    <header class="toolbar">
      <form class="search-wrapper">
        <img src="./img/Frame (17).png" alt="search">
        <input type="text" placeholder="Search for a part-time job">
      </form>
      <div class="map">
        <img src="./img/Frame (8).png" alt="map">
        <span>Use map</span>
      </div>
    </header>

    <section class="category-grid">
      <div class="cat-card bg-pink">
        <img src="./img/Frame (9).png" alt="Furniture">
        <span class="label">Furniture</span>
      </div>
      <div class="cat-card bg-purple">
        <img src="./img/Frame (10).png" alt="Property">
        <span class="label">Property</span>
      </div>
      <div class="cat-card bg-blue">
        <img src="./img/Frame (11).png" alt="Job">
        <span class="label">Job</span>
      </div>
      <div class="cat-card bg-teal">
        <img src="./img/Frame (12).png" alt="Travel">
        <span class="label">Travel</span>
      </div>
      <div class="cat-card bg-green">
        <img src="./img/Frame (13).png" alt="Boat">
        <span class="label">Boat</span>
      </div>
      <div class="cat-card bg-white">
        <img src="./img/Frame (14).png" alt="MC">
        <span class="label">MC</span>
      </div>
      <div class="cat-card bg-yellow">
        <img src="./img/Frame (15).png" alt="Economy">
        <span class="label">Economy</span>
      </div>
      <div class="cat-card bg-orange">
        <img src="./img/Frame (16).png" alt="Holiday">
        <span class="label">Holiday</span>
      </div>
    </section>
  </main>
</body>

</html>
