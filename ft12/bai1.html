<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./public/css/bai1.css">
  <title>Bai 1</title>
</head>

<body>
  <div class="container">

    <div>

      <h1>Users</h1>
      <div class="toolbar">

        <div class="search-box">
          <input type="text" placeholder="Search users">
        </div>

        <nav class="filter-tabs">
          <button class="tab">Reputation</button>
          <button class="tab active">New users</button>
          <button class="tab">Voters</button>
          <button class="tab">Editors</button>
          <button class="tab">Moderators</button>
        </nav>

      </div>

    </div>

    <div class="user-grid">

      <div class="user-card">
        <img src="./public/image/image (1).png" alt="Lelah" class="avatar">
        <div class="user-details">
          <h2 class="user-name">Lelah Nichols</h2>
          <p class="user-location">Troy, MI</p>
          <div class="tags-container">
            <span class="tag">clothes</span>
            <span class="tag">stem</span>
          </div>
        </div>
      </div>

      <div class="user-card active">
        <img src="./public/image/image (2).png" alt="Jesus" class="avatar">
        <div class="user-details">
          <h2 class="user-name">Jesus Weiss</h2>
          <p class="user-location">Fort Worth, TX</p>
          <div class="tags-container">
            <span class="tag">headset</span>
            <span class="tag">gadget</span>
            <span class="tag">speed</span>
            <span class="tag">winter</span>
          </div>
        </div>
      </div>

      <div class="user-card">
        <img src="./public/image/image (3).png" alt="Annie" class="avatar">
        <div class="user-details">
          <h2 class="user-name">Annie Rice</h2>
          <p class="user-location">Austin, TX</p>
          <div class="tags-container">
            <span class="tag">road</span>
            <span class="tag">mountain</span>
            <span class="tag">trip</span>
          </div>
        </div>
      </div>

      <div class="user-card">
        <img src="./public/image/image (4).png" alt="Annie" class="avatar">
        <div class="user-details">
          <h2 class="user-name">Robert Brower</h2>
          <p class="user-location">Cincinnati, OH</p>
          <div class="tags-container">
            <span class="tag">Maintenance</span>
            <span class="tag">gears</span>
          </div>
        </div>
      </div>

      <div class="user-card">
        <img src="./public/image/image (5).png" alt="Annie" class="avatar">
        <div class="user-details">
          <h2 class="user-name">Amy Campbell</h2>
          <p class="user-location">Warrior, AL</p>
          <div class="tags-container">
            <span class="tag">music</span>
            <span class="tag">disks</span>

          </div>
        </div>
      </div>

      <div class="user-card">
        <img src="./public/image/image (6).png" alt="Annie" class="avatar">
        <div class="user-details">
          <h2 class="user-name">Anthony S.Morin</h2>
          <p class="user-location">Lyndhurst, NJ</p>
          <div class="tags-container">
            <span class="tag">vintage</span>
            <span class="tag">electric</span>

          </div>
        </div>
      </div>

    </div>
  </div>
</body>

</html>
